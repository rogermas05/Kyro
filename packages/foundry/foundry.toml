[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
via_ir = true
solc_version = "0.8.24"

[rpc_endpoints]
adi_testnet = "${ADI_RPC_URL}"
localhost = "http://localhost:8545"

[etherscan]
adi_testnet = { key = "${ETHERSCAN_API_KEY}", url = "https://explorer.ab.testnet.adifoundation.ai/api" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
